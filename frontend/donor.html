<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Donor Registration — Location</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#0b1220;
      --card:#0b1226cc;
      --accent:#ef4444;
      --muted:#9aa4b2;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#e6eef6;display:flex;align-items:center;justify-content:center;padding:24px;
    }
    .card{
      width:100%;max-width:720px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;padding:28px;box-shadow:0 8px 30px rgba(2,6,23,0.6);backdrop-filter: blur(6px);
    }
    header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#fb923c);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
    h1{font-size:20px;margin:0}
    p.lead{margin:6px 0 0;color:var(--muted);font-size:13px}

    form{display:flex;flex-direction:column;gap:12px}
    label{font-size:13px;color:var(--muted)}
    .input-row{display:flex;gap:10px}
    input[type="text"]{
      flex:1;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:var(--glass);color:inherit;font-size:15px;outline:none;
      transition:box-shadow .18s, transform .12s;
    }
    input[type="text"]:focus{box-shadow:0 6px 24px rgba(2,6,23,0.5);transform:translateY(-1px)}

    .btn{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:0;background:#111827;color:#fff;font-weight:600;cursor:pointer}
    .btn:active{transform:translateY(1px)}
    .btn-geo{background:linear-gradient(90deg,#111827,#0f172a);border:1px solid rgba(255,255,255,0.04)}
    .btn-open{background:linear-gradient(90deg,#ef4444,#fb923c);box-shadow:0 8px 26px rgba(239,68,68,0.18)}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);font-weight:600}

    .controls{display:flex;gap:10px;flex-wrap:wrap}
    .status{font-size:13px;color:var(--muted);min-height:18px}

    /* responsive */
    @media (max-width:520px){
      .card{padding:18px}
      .logo{width:44px;height:44px}
      .input-row{flex-direction:column}
      .controls{flex-direction:column}
      .btn{width:100%;justify-content:center}
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <header>
      <div class="logo">BD</div>
      <div>
        <h1>Donor Registration — Location</h1>
        <p class="lead">Enter a hospital or use your current GPS location, then open it in Google Maps.</p>
      </div>
    </header>

    <form id="locationForm" onsubmit="return false;" autocomplete="off">
      <div>
        <label for="locationInput">Hospital / Location</label>
        <div class="input-row">
          <input id="locationInput" type="text" placeholder="Enter Hospital / Location" aria-label="Enter Hospital or Location" />
          <button id="useGeoBtn" class="btn btn-geo" type="button">📍 Use Current Location</button>
        </div>
      </div>

      <div class="controls">
        <button id="openMapsBtn" class="btn btn-open" type="button">🗺 Open Location in Google Maps</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">✖ Clear</button>
      </div>

      <div class="status" id="statusText" aria-live="polite"></div>
    </form>
  </main>

  <script>
    // Required DOM APIs: document.getElementById, addEventListener, encodeURIComponent
    const locationInput = document.getElementById('locationInput');
    const useGeoBtn = document.getElementById('useGeoBtn');
    const openMapsBtn = document.getElementById('openMapsBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('statusText');

    function setStatus(msg){ statusText.textContent = msg || ''; }

    openMapsBtn.addEventListener('click', function(){
      const loc = locationInput.value.trim();
      if(!loc){
        alert('Please enter a location');
        return;
      }
      // Use encodeURIComponent for query
      const q = encodeURIComponent(loc);
      const url = 'https://www.google.com/maps/search/?api=1&query=' + q;
      // Redirect browser to Google Maps (no reload of current form)
      window.location.href = url;
    });

    useGeoBtn.addEventListener('click', function(){
      // Check support
      if(!('geolocation' in navigator)){
        alert('Geolocation not supported in this browser');
        return;
      }
      setStatus('Getting current location...');
      useGeoBtn.disabled = true;

      navigator.geolocation.getCurrentPosition(function(position){
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        // Redirect to lat,lng on Google Maps
        const url = 'https://www.google.com/maps?q=' + lat + ',' + lng;
        // reset status briefly
        setStatus('');
        window.location.href = url;
      }, function(err){
        useGeoBtn.disabled = false;
        setStatus('');
        if(err && err.code === 1){
          alert('Location access denied');
        } else {
          alert(err && err.message ? err.message : 'Unable to retrieve location');
        }
      }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 });
    });

    clearBtn.addEventListener('click', function(){
      locationInput.value = '';
      setStatus('');
      locationInput.focus();
    });

    // Small UX: press Enter to open maps for typed location
    locationInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        e.preventDefault();
        openMapsBtn.click();
      }
    });
  </script>
</body>
</html>
